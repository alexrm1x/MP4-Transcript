<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP4-Transcript</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Montserrat', 'sans-serif'] } } }
    }
  </script>
</head>
<body class="bg-white font-sans min-h-screen">

  <!-- Header -->
  <header class="px-6 py-4 shadow-sm" style="background:#002d40">
    <h1 class="text-white font-extrabold text-2xl tracking-tight">MP4-Transcript</h1>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8 space-y-8">

    <!-- Panel de subida -->
    <div class="card bg-base-100 shadow border border-base-200">
      <div class="card-body">
        <h2 class="card-title font-bold text-lg" style="color:#002d40">Subir archivos</h2>
        <form id="uploadForm" enctype="multipart/form-data" class="space-y-4">
          <input
            type="file"
            id="fileInput"
            name="archivo"
            accept=".mp4,.mp3"
            required
            multiple
            class="file-input file-input-bordered w-full"
          >
          <button
            type="submit"
            class="btn rounded-md w-full font-bold text-white"
            style="background:#002d40; border-color:#002d40"
          >
            Transcribir
          </button>
        </form>
      </div>
    </div>

    <!-- Área de estado -->
    <div id="resultado" class="hidden"></div>

    <!-- Panel de transcripciones -->
    <div>
      <h2 class="font-bold text-lg mb-4" style="color:#002d40">Transcripciones guardadas</h2>
      <div id="lista"></div>
    </div>

  </main>

  <script>
    async function cargarTranscripciones() {
      const res = await fetch('/transcriptions');
      const lista = await res.json();
      const contenedor = document.getElementById('lista');

      if (lista.length === 0) {
        contenedor.innerHTML = '<p class="text-gray-400 text-sm">No hay transcripciones guardadas.</p>';
        return;
      }

      contenedor.innerHTML = lista.map(t => {
        const fecha = new Date(t.created_at).toLocaleString('es-ES');
        const badgeEstado = t.status === 'completed'
          ? '<span class="badge badge-success font-medium">✅ Completado</span>'
          : t.status === 'error'
          ? '<span class="badge badge-error font-medium">❌ Error</span>'
          : '<span class="badge badge-warning font-medium">⏳ Procesando</span>';
        const preview = t.transcription
          ? `<p class="text-sm text-gray-600 mt-2">${t.transcription.slice(0, 200)}${t.transcription.length > 200 ? '…' : ''}</p>`
          : '';
        const btnVerCompleta = t.transcription
          ? `<button onclick="verCompleta(${t.id})" class="btn btn-sm btn-outline rounded-md" style="border-color:#002d40; color:#002d40">Ver completa</button>`
          : '';
        const btnCopiar = t.transcription
          ? `<button onclick="copiar(${t.id})" class="btn btn-sm btn-outline btn-neutral rounded-md">Copiar</button>
             <span id="copiado-${t.id}" class="badge badge-success hidden">¡Copiado!</span>`
          : '';
        return `
          <div id="t-${t.id}" class="card bg-base-100 shadow-sm border border-base-200 mb-3">
            <div class="card-body py-4 px-5">
              <div class="flex items-start justify-between gap-2 flex-wrap">
                <div>
                  <p class="font-bold text-sm" style="color:#002d40">${t.filename}</p>
                  <p class="text-xs text-gray-400 mt-0.5">${fecha}</p>
                </div>
                ${badgeEstado}
              </div>
              ${preview}
              <div class="flex flex-wrap gap-2 mt-3">
                ${btnVerCompleta}
                ${btnCopiar}
                <button onclick="borrar(${t.id})" class="btn btn-sm btn-outline btn-error rounded-md">Borrar</button>
              </div>
              <pre id="completa-${t.id}" class="hidden bg-gray-50 rounded-md p-3 text-sm whitespace-pre-wrap text-gray-700 mt-3 leading-relaxed"></pre>
            </div>
          </div>`;
      }).join('');
    }

    async function verCompleta(id) {
      const pre = document.getElementById(`completa-${id}`);
      if (pre.classList.contains('hidden')) {
        const res = await fetch('/transcriptions');
        const lista = await res.json();
        const t = lista.find(x => x.id === id);
        pre.textContent = t.transcription;
        pre.classList.remove('hidden');
      } else {
        pre.classList.add('hidden');
      }
    }

    async function copiar(id) {
      const res = await fetch('/transcriptions');
      const lista = await res.json();
      const t = lista.find(x => x.id === id);
      await navigator.clipboard.writeText(t.transcription);
      const span = document.getElementById(`copiado-${id}`);
      span.classList.remove('hidden');
      setTimeout(() => { span.classList.add('hidden'); }, 2000);
    }

    async function borrar(id) {
      await fetch(`/transcriptions/${id}`, { method: 'DELETE' });
      cargarTranscripciones();
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const archivos = Array.from(document.getElementById('fileInput').files);
      if (archivos.length === 0) return;

      const resultado = document.getElementById('resultado');
      let completados = 0;
      let errores = 0;

      for (let i = 0; i < archivos.length; i++) {
        resultado.className = 'alert alert-info text-sm font-medium';
        resultado.textContent = `⏳ Procesando ${i + 1} de ${archivos.length}: ${archivos[i].name}`;

        const formData = new FormData();
        formData.append('archivo', archivos[i]);

        try {
          const res = await fetch('/upload', { method: 'POST', body: formData });
          const data = await res.json();
          if (data.error) {
            errores++;
          } else {
            completados++;
          }
        } catch {
          errores++;
        }

        cargarTranscripciones();
      }

      if (errores === 0) {
        resultado.className = 'alert alert-success text-sm font-medium';
        resultado.textContent = `✅ Cola completada: ${completados} archivo${completados !== 1 ? 's' : ''} transcritos.`;
      } else {
        resultado.className = 'alert alert-warning text-sm font-medium';
        resultado.textContent = `⚠️ Cola completada: ${completados} completados, ${errores} con error.`;
      }
    });

    cargarTranscripciones();
  </script>
</body>
</html>
